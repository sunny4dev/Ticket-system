name: Production CI/CD Pipeline

on:
  push:
    branches: [ "main" ]       # Triggers when a PR is merged
  pull_request:
    branches: [ "main" ]       # Triggers when a PR is opened/updated

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1️⃣ Clone the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Docker Buildx (Enables caching to make builds 5x faster)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Log in to Docker Hub (Only if this is a merge to main, NOT a PR)
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4️⃣ Extract Tags (Automatically creates 'latest' and 'sha-xxxxx' tags)
      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: sunseyy/ticketing-backend
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      # 5️⃣ Build and Push Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }} # Only pushes on merge
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6️⃣ Extract Tags for Frontend
      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: sunseyy/ticketing-frontend
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      # 7️⃣ Build and Push Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }} # Only pushes on merge
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

